<svg viewBox="0 0 780 780" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

  <rect width="780" height="780" rx="12" fill="#ffffff" stroke="#e8e8e8" stroke-width="1"/>

  <text x="40" y="54" font-size="24" font-weight="500" fill="#1a1a1a">Umberto Collodel</text>
  <text x="40" y="73" font-size="12" fill="#888888">Senior Economist · Monetary Policy · Central Bank of Malta  |  PhD, Paris School of Economics</text>

  <rect x="40" y="88" width="3" height="52" rx="1.5" fill="#534AB7"/>
  <text x="52" y="101" font-size="13" fill="#555555">I study how information anticipates macroeconomic stress — in central bank</text>
  <text x="52" y="117" font-size="13" fill="#555555">language, retail prices, news flows, and capital movements. Combining</text>
  <text x="52" y="133" font-size="13" fill="#555555">econometrics with LLMs and alternative data for early-warning tools.</text>

  <rect x="40" y="154" width="130" height="20" rx="10" fill="#FAECE7"/>
  <text x="105" y="168" font-size="10" font-weight="500" fill="#712B13" text-anchor="middle">Early warning systems</text>
  <rect x="178" y="154" width="170" height="20" rx="10" fill="#EEEDFE"/>
  <text x="263" y="168" font-size="10" font-weight="500" fill="#3C3489" text-anchor="middle">Monetary policy communication</text>
  <rect x="356" y="154" width="130" height="20" rx="10" fill="#E1F5EE"/>
  <text x="421" y="168" font-size="10" font-weight="500" fill="#085041" text-anchor="middle">Real-time forecasting</text>
  <rect x="494" y="154" width="145" height="20" rx="10" fill="#FAEEDA"/>
  <text x="566" y="168" font-size="10" font-weight="500" fill="#633806" text-anchor="middle">LLMs &amp; alternative data</text>
  <rect x="647" y="154" width="93" height="20" rx="10" fill="#E6F1FB"/>
  <text x="693" y="168" font-size="10" font-weight="500" fill="#0C447C" text-anchor="middle">Macro-financial</text>

  <line x1="40" y1="190" x2="740" y2="190" stroke="#eeeeee" stroke-width="1"/>

  <text x="40" y="209" font-size="10" font-weight="600" letter-spacing="0.09em" fill="#999999">EXPERIENCE</text>

  <rect x="40" y="217" width="10" height="10" rx="2" fill="#534AB7"/>
  <text x="58" y="227" font-size="12" font-weight="600" fill="#1a1a1a">Central Bank of Malta</text>
  <text x="58" y="241" font-size="11" fill="#888888">Senior Economist, Monetary Policy · 2023–present</text>

  <rect x="290" y="217" width="10" height="10" rx="2" fill="#185FA5"/>
  <text x="308" y="227" font-size="12" font-weight="600" fill="#1a1a1a">International Monetary Fund</text>
  <text x="308" y="241" font-size="11" fill="#888888">Research Officer &amp; Consultant · IEO</text>

  <rect x="560" y="217" width="10" height="10" rx="2" fill="#1D9E75"/>
  <text x="578" y="227" font-size="12" font-weight="600" fill="#1a1a1a">OECD</text>
  <text x="578" y="241" font-size="11" fill="#888888">External Consultant</text>

  <line x1="40" y1="260" x2="740" y2="260" stroke="#eeeeee" stroke-width="1"/>

  <text x="40" y="279" font-size="10" font-weight="600" letter-spacing="0.09em" fill="#999999">ACTIVE PROJECTS</text>

  <!-- Card 01 — full width -->
  <rect x="40" y="288" width="700" height="100" rx="8" fill="#ffffff" stroke="#e8e8e8" stroke-width="0.75"/>
  <rect x="40" y="288" width="700" height="3" rx="1.5" fill="#D4537E"/>
  <text x="56" y="308" font-size="10" font-weight="600" fill="#aaaaaa">01</text>
  <text x="56" y="324" font-size="12" font-weight="600" fill="#1a1a1a">ECB announcements and market uncertainty: a novel OIS-based measure</text>
  <text x="56" y="340" font-size="11" fill="#666666">A market-based measure of monetary policy uncertainty — the spread in OIS rate volatility around ECB announcements — shows that</text>
  <text x="56" y="353" font-size="11" fill="#666666">policy meetings raise uncertainty regardless of the surprise sign, lifting yields, depressing equities, and appreciating the Euro.</text>
  <rect x="56" y="364" width="60" height="16" rx="8" fill="#FBEAF0"/>
  <text x="86" y="375" font-size="10" font-weight="500" fill="#993556" text-anchor="middle">OIS · ECB</text>
  <rect x="122" y="364" width="88" height="16" rx="8" fill="#FBEAF0"/>
  <text x="166" y="375" font-size="10" font-weight="500" fill="#993556" text-anchor="middle">Market uncertainty</text>
  <rect x="216" y="364" width="76" height="16" rx="8" fill="#FBEAF0"/>
  <text x="254" y="375" font-size="10" font-weight="500" fill="#993556" text-anchor="middle">Asset prices · Euro</text>

  <!-- Card 02 -->
  <rect x="40" y="402" width="340" height="148" rx="8" fill="#ffffff" stroke="#e8e8e8" stroke-width="0.75"/>
  <rect x="40" y="402" width="340" height="3" rx="1.5" fill="#534AB7"/>
  <text x="56" y="422" font-size="10" font-weight="600" fill="#aaaaaa">02</text>
  <text x="56" y="438" font-size="12" font-weight="600" fill="#1a1a1a">Anticipating post-meeting uncertainty</text>
  <text x="56" y="452" font-size="12" font-weight="600" fill="#1a1a1a">with LLM agents</text>
  <text x="56" y="469" font-size="11" fill="#666666">Can LLM agents reading ECB communication anticipate</text>
  <text x="56" y="482" font-size="11" fill="#666666">how markets revise monetary policy uncertainty after</text>
  <text x="56" y="495" font-size="11" fill="#666666">Governing Council meetings?</text>
  <rect x="56" y="508" width="34" height="16" rx="8" fill="#EEEDFE"/>
  <text x="73" y="519" font-size="10" font-weight="500" fill="#534AB7" text-anchor="middle">LLMs</text>
  <rect x="96" y="508" width="28" height="16" rx="8" fill="#EEEDFE"/>
  <text x="110" y="519" font-size="10" font-weight="500" fill="#534AB7" text-anchor="middle">ECB</text>
  <rect x="130" y="508" width="86" height="16" rx="8" fill="#EEEDFE"/>
  <text x="173" y="519" font-size="10" font-weight="500" fill="#534AB7" text-anchor="middle">Monetary policy</text>

  <!-- Card 03 -->
  <rect x="400" y="402" width="340" height="148" rx="8" fill="#ffffff" stroke="#e8e8e8" stroke-width="0.75"/>
  <rect x="400" y="402" width="340" height="3" rx="1.5" fill="#185FA5"/>
  <text x="416" y="422" font-size="10" font-weight="600" fill="#aaaaaa">03</text>
  <text x="416" y="438" font-size="12" font-weight="600" fill="#1a1a1a">Political pressure on the Fed</text>
  <text x="416" y="452" font-size="12" font-weight="600" fill="#1a1a1a">and market pricing</text>
  <text x="416" y="469" font-size="11" fill="#666666">Classifying dovish political pressure on the Federal</text>
  <text x="416" y="482" font-size="11" fill="#666666">Reserve using LLMs — estimating how markets discount</text>
  <text x="416" y="495" font-size="11" fill="#666666">Fed credibility in response.</text>
  <rect x="416" y="508" width="100" height="16" rx="8" fill="#E6F1FB"/>
  <text x="466" y="519" font-size="10" font-weight="500" fill="#185FA5" text-anchor="middle">Text classification</text>
  <rect x="522" y="508" width="71" height="16" rx="8" fill="#E6F1FB"/>
  <text x="557" y="519" font-size="10" font-weight="500" fill="#185FA5" text-anchor="middle">Asset pricing</text>
  <rect x="599" y="508" width="28" height="16" rx="8" fill="#E6F1FB"/>
  <text x="613" y="519" font-size="10" font-weight="500" fill="#185FA5" text-anchor="middle">Fed</text>

  <!-- Card 04 -->
  <rect x="40" y="564" width="340" height="148" rx="8" fill="#ffffff" stroke="#e8e8e8" stroke-width="0.75"/>
  <rect x="40" y="564" width="340" height="3" rx="1.5" fill="#1D9E75"/>
  <text x="56" y="584" font-size="10" font-weight="600" fill="#aaaaaa">04</text>
  <text x="56" y="600" font-size="12" font-weight="600" fill="#1a1a1a">Nowcasting Maltese inflation from</text>
  <text x="56" y="614" font-size="12" font-weight="600" fill="#1a1a1a">web-scraped retail prices</text>
  <text x="56" y="631" font-size="11" fill="#666666">High-frequency price signals from scraped retail data</text>
  <text x="56" y="644" font-size="11" fill="#666666">to nowcast CPI in a small open economy — replacing</text>
  <text x="56" y="657" font-size="11" fill="#666666">lagged official statistics with real-time alternatives.</text>
  <rect x="56" y="670" width="64" height="16" rx="8" fill="#E1F5EE"/>
  <text x="88" y="681" font-size="10" font-weight="500" fill="#0F6E56" text-anchor="middle">Nowcasting</text>
  <rect x="126" y="670" width="72" height="16" rx="8" fill="#E1F5EE"/>
  <text x="162" y="681" font-size="10" font-weight="500" fill="#0F6E56" text-anchor="middle">Web scraping</text>
  <rect x="204" y="670" width="65" height="16" rx="8" fill="#E1F5EE"/>
  <text x="236" y="681" font-size="10" font-weight="500" fill="#0F6E56" text-anchor="middle">Small states</text>

  <!-- Card 05 — PhD thesis -->
  <rect x="400" y="564" width="340" height="148" rx="8" fill="#ffffff" stroke="#e8e8e8" stroke-width="0.75"/>
  <rect x="400" y="564" width="340" height="3" rx="1.5" fill="#888780"/>
  <text x="416" y="584" font-size="10" font-weight="600" fill="#aaaaaa">05  ·  PhD thesis, PSE</text>
  <text x="416" y="600" font-size="12" font-weight="600" fill="#1a1a1a">Macroeconomic forecasting:</text>
  <text x="416" y="614" font-size="12" font-weight="600" fill="#1a1a1a">crises, institutions, and archives</text>
  <text x="416" y="631" font-size="11" fill="#666666">Early warning systems for external crises; forecast</text>
  <text x="416" y="644" font-size="11" fill="#666666">errors across institutions and the business cycle;</text>
  <text x="416" y="657" font-size="11" fill="#666666">and a novel IMF archival dataset on crisis discourse.</text>
  <rect x="416" y="670" width="68" height="16" rx="8" fill="#F1EFE8"/>
  <text x="450" y="681" font-size="10" font-weight="500" fill="#5F5E5A" text-anchor="middle">Early warnings</text>
  <rect x="490" y="670" width="74" height="16" rx="8" fill="#F1EFE8"/>
  <text x="527" y="681" font-size="10" font-weight="500" fill="#5F5E5A" text-anchor="middle">IMF archives</text>
  <rect x="570" y="670" width="82" height="16" rx="8" fill="#F1EFE8"/>
  <text x="611" y="681" font-size="10" font-weight="500" fill="#5F5E5A" text-anchor="middle">Forecast errors</text>

  <line x1="40" y1="725" x2="740" y2="725" stroke="#eeeeee" stroke-width="1"/>

  <text x="40" y="743" font-size="10" font-weight="600" letter-spacing="0.09em" fill="#999999">STACK</text>
  <rect x="40" y="751" width="24" height="18" rx="5" fill="#f5f5f5" stroke="#e8e8e8" stroke-width="0.5"/>
  <text x="52" y="763" font-size="11" fill="#666666" text-anchor="middle">R</text>
  <rect x="70" y="751" width="42" height="18" rx="5" fill="#f5f5f5" stroke="#e8e8e8" stroke-width="0.5"/>
  <text x="91" y="763" font-size="11" fill="#666666" text-anchor="middle">Python</text>
  <rect x="118" y="751" width="28" height="18" rx="5" fill="#f5f5f5" stroke="#e8e8e8" stroke-width="0.5"/>
  <text x="132" y="763" font-size="11" fill="#666666" text-anchor="middle">SQL</text>
  <rect x="152" y="751" width="36" height="18" rx="5" fill="#f5f5f5" stroke="#e8e8e8" stroke-width="0.5"/>
  <text x="170" y="763" font-size="11" fill="#666666" text-anchor="middle">LaTeX</text>
  <rect x="194" y="751" width="26" height="18" rx="5" fill="#f5f5f5" stroke="#e8e8e8" stroke-width="0.5"/>
  <text x="207" y="763" font-size="11" fill="#666666" text-anchor="middle">Git</text>
  <rect x="226" y="751" width="36" height="18" rx="5" fill="#f5f5f5" stroke="#e8e8e8" stroke-width="0.5"/>
  <text x="244" y="763" font-size="11" fill="#666666" text-anchor="middle">HTML</text>

  <text x="430" y="743" font-size="10" font-weight="600" letter-spacing="0.09em" fill="#999999">FIND ME</text>
  <text x="430" y="763" font-size="12" fill="#185FA5">umbertocollodel.github.io</text>
