<svg viewBox="0 0 780 690" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <style>
      .text-primary { fill: #1a1a1a; }
      .text-secondary { fill: #666666; }
      .section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.09em; fill: #999999; }
      .name { font-size: 24px; font-weight: 500; fill: #1a1a1a; }
      .role { font-size: 12px; fill: #888888; }
      .tagline { font-size: 13px; fill: #555555; }
      .proj-num { font-size: 10px; font-weight: 600; fill: #aaaaaa; }
      .proj-title { font-size: 12px; font-weight: 600; fill: #1a1a1a; }
      .proj-desc { font-size: 11px; fill: #666666; }
      .tag-text { font-size: 10px; font-weight: 500; }
      .stk-text { font-size: 11px; fill: #666666; }
      .link-text { font-size: 12px; fill: #185FA5; }
      .exp-org { font-size: 12px; font-weight: 600; fill: #1a1a1a; }
      .exp-role { font-size: 11px; fill: #888888; }
    </style>
  </defs>

  <rect width="780" height="690" rx="12" fill="#ffffff" stroke="#e8e8e8" stroke-width="1"/>

  <!-- Hero -->
  <text x="40" y="54" class="name">Umberto Collodel</text>
  <text x="40" y="73" class="role">Senior Economist · Monetary Policy · Central Bank of Malta  |  PhD, Paris School of Economics</text>

  <!-- Tagline -->
  <rect x="40" y="88" width="3" height="52" rx="1.5" fill="#534AB7"/>
  <text x="52" y="101" class="tagline">I study how information anticipates macroeconomic stress — in central bank</text>
  <text x="52" y="117" class="tagline">language, retail prices, news flows, and capital movements. Combining</text>
  <text x="52" y="133" class="tagline">econometrics with LLMs and alternative data for early-warning tools.</text>

  <!-- Chips -->
  <rect x="40" y="154" width="130" height="20" rx="10" fill="#FAECE7"/>
  <text x="105" y="168" class="tag-text" fill="#712B13" text-anchor="middle">Early warning systems</text>
  <rect x="178" y="154" width="170" height="20" rx="10" fill="#EEEDFE"/>
  <text x="263" y="168" class="tag-text" fill="#3C3489" text-anchor="middle">Monetary policy communication</text>
  <rect x="356" y="154" width="130" height="20" rx="10" fill="#E1F5EE"/>
  <text x="421" y="168" class="tag-text" fill="#085041" text-anchor="middle">Real-time forecasting</text>
  <rect x="494" y="154" width="145" height="20" rx="10" fill="#FAEEDA"/>
  <text x="566" y="168" class="tag-text" fill="#633806" text-anchor="middle">LLMs &amp; alternative data</text>
  <rect x="647" y="154" width="93" height="20" rx="10" fill="#E6F1FB"/>
  <text x="693" y="168" class="tag-text" fill="#0C447C" text-anchor="middle">Macro-financial</text>

  <line x1="40" y1="190" x2="740" y2="190" stroke="#eeeeee" stroke-width="1"/>

  <!-- Experience -->
  <text x="40" y="209" class="section-label">EXPERIENCE</text>

  <!-- CBM -->
  <rect x="40" y="217" width="10" height="10" rx="2" fill="#534AB7"/>
  <text x="58" y="227" class="exp-org">Central Bank of Malta</text>
  <text x="58" y="241" class="exp-role">Senior Economist, Monetary Policy  ·  2023 – present</text>

  <!-- IMF -->
  <rect x="290" y="217" width="10" height="10" rx="2" fill="#185FA5"/>
  <text x="308" y="227" class="exp-org">International Monetary Fund</text>
  <text x="308" y="241" class="exp-role">Research Officer &amp; Consultant  ·  IEO</text>

  <!-- OECD -->
  <rect x="560" y="217" width="10" height="10" rx="2" fill="#1D9E75"/>
  <text x="578" y="227" class="exp-org">OECD</text>
  <text x="578" y="241" class="exp-role">Economist</text>

  <line x1="40" y1="260" x2="740" y2="260" stroke="#eeeeee" stroke-width="1"/>

  <!-- Projects -->
  <text x="40" y="279" class="section-label">ACTIVE PROJECTS</text>

  <!-- Card 01 -->
  <rect x="40" y="288" width="340" height="148" rx="8" fill="#ffffff" stroke="#e8e8e8" stroke-width="0.75"/>
  <rect x="40" y="288" width="340" height="3" rx="1.5" fill="#534AB7"/>
  <text x="56" y="308" class="proj-num">01</text>
  <text x="56" y="324" class="proj-title">Anticipating post-meeting uncertainty</text>
  <text x="56" y="338" class="proj-title">with LLM agents</text>
  <text x="56" y="355" class="proj-desc">Can LLM agents reading ECB communication anticipate</text>
  <text x="56" y="368" class="proj-desc">how markets revise monetary policy uncertainty after</text>
  <text x="56" y="381" class="proj-desc">Governing Council meetings?</text>
  <rect x="56" y="394" width="34" height="16" rx="8" fill="#EEEDFE"/>
  <text x="73" y="405" class="tag-text" fill="#534AB7" text-anchor="middle">LLMs</text>
  <rect x="96" y="394" width="28" height="16" rx="8" fill="#EEEDFE"/>
  <text x="110" y="405" class="tag-text" fill="#534AB7" text-anchor="middle">ECB</text>
  <rect x="130" y="394" width="86" height="16" rx="8" fill="#EEEDFE"/>
  <text x="173" y="405" class="tag-text" fill="#534AB7" text-anchor="middle">Monetary policy</text>

  <!-- Card 02 -->
  <rect x="400" y="288" width="340" height="148" rx="8" fill="#ffffff" stroke="#e8e8e8" stroke-width="0.75"/>
  <rect x="400" y="288" width="340" height="3" rx="1.5" fill="#185FA5"/>
  <text x="416" y="308" class="proj-num">02</text>
  <text x="416" y="324" class="proj-title">Political pressure on the Fed</text>
  <text x="416" y="338" class="proj-title">and market pricing</text>
  <text x="416" y="355" class="proj-desc">Classifying dovish political pressure on the Federal</text>
  <text x="416" y="368" class="proj-desc">Reserve using LLMs — estimating how markets discount</text>
  <text x="416" y="381" class="proj-desc">Fed credibility in response.</text>
  <rect x="416" y="394" width="100" height="16" rx="8" fill="#E6F1FB"/>
  <text x="466" y="405" class="tag-text" fill="#185FA5" text-anchor="middle">Text classification</text>
  <rect x="522" y="394" width="71" height="16" rx="8" fill="#E6F1FB"/>
  <text x="557" y="405" class="tag-text" fill="#185FA5" text-anchor="middle">Asset pricing</text>
  <rect x="599" y="394" width="28" height="16" rx="8" fill="#E6F1FB"/>
  <text x="613" y="405" class="tag-text" fill="#185FA5" text-anchor="middle">Fed</text>

  <!-- Card 03 -->
  <rect x="40" y="450" width="340" height="148" rx="8" fill="#ffffff" stroke="#e8e8e8" stroke-width="0.75"/>
  <rect x="40" y="450" width="340" height="3" rx="1.5" fill="#1D9E75"/>
  <text x="56" y="470" class="proj-num">03</text>
  <text x="56" y="486" class="proj-title">Nowcasting Maltese inflation from</text>
  <text x="56" y="500" class="proj-title">web-scraped retail prices</text>
  <text x="56" y="517" class="proj-desc">High-frequency price signals from scraped retail data</text>
  <text x="56" y="530" class="proj-desc">to nowcast CPI in a small open economy — replacing</text>
  <text x="56" y="543" class="proj-desc">lagged official statistics with real-time alternatives.</text>
  <rect x="56" y="556" width="64" height="16" rx="8" fill="#E1F5EE"/>
  <text x="88" y="567" class="tag-text" fill="#0F6E56" text-anchor="middle">Nowcasting</text>
  <rect x="126" y="556" width="72" height="16" rx="8" fill="#E1F5EE"/>
  <text x="162" y="567" class="tag-text" fill="#0F6E56" text-anchor="middle">Web scraping</text>
  <rect x="204" y="556" width="65" height="16" rx="8" fill="#E1F5EE"/>
  <text x="236" y="567" class="tag-text" fill="#0F6E56" text-anchor="middle">Small states</text>

  <!-- Card 04 -->
  <rect x="400" y="450" width="340" height="148" rx="8" fill="#ffffff" stroke="#e8e8e8" stroke-width="0.75"/>
  <rect x="400" y="450" width="340" height="3" rx="1.5" fill="#888780"/>
  <text x="416" y="470" class="proj-num">04</text>
  <text x="416" y="486" class="proj-title">Early warnings for sudden stops</text>
  <text x="416" y="500" class="proj-title">in emerging markets  ·  PhD thesis</text>
  <text x="416" y="517" class="proj-desc">Predicting capital flow reversals and external crises</text>
  <text x="416" y="530" class="proj-desc">using macro-financial indicators across emerging</text>
  <text x="416" y="543" class="proj-desc">economies.</text>
  <rect x="416" y="556" width="68" height="16" rx="8" fill="#F1EFE8"/>
  <text x="450" y="567" class="tag-text" fill="#5F5E5A" text-anchor="middle">Capital flows</text>
  <rect x="490" y="556" width="92" height="16" rx="8" fill="#F1EFE8"/>
  <text x="536" y="567" class="tag-text" fill="#5F5E5A" text-anchor="middle">Crisis prediction</text>
  <rect x="588" y="556" width="98" height="16" rx="8" fill="#F1EFE8"/>
  <text x="637" y="567" class="tag-text" fill="#5F5E5A" text-anchor="middle">Emerging markets</text>

  <line x1="40" y1="618" x2="740" y2="618" stroke="#eeeeee" stroke-width="1"/>

  <!-- Footer -->
  <text x="40" y="636" class="section-label">STACK</text>
  <rect x="40" y="644" width="24" height="18" rx="5" fill="#f5f5f5" stroke="#e8e8e8" stroke-width="0.5"/>
  <text x="52" y="656" class="stk-text" text-anchor="middle">R</text>
  <rect x="70" y="644" width="42" height="18" rx="5" fill="#f5f5f5" stroke="#e8e8e8" stroke-width="0.5"/>
  <text x="91" y="656" class="stk-text" text-anchor="middle">Python</text>
  <rect x="118" y="644" width="28" height="18" rx="5" fill="#f5f5f5" stroke="#e8e8e8" stroke-width="0.5"/>
  <text x="132" y="656" class="stk-text" text-anchor="middle">SQL</text>
  <rect x="152" y="644" width="36" height="18" rx="5" fill="#f5f5f5" stroke="#e8e8e8" stroke-width="0.5"/>
  <text x="170" y="656" class="stk-text" text-anchor="middle">LaTeX</text>
  <rect x="194" y="644" width="26" height="18" rx="5" fill="#f5f5f5" stroke="#e8e8e8" stroke-width="0.5"/>
  <text x="207" y="656" class="stk-text" text-anchor="middle">Git</text>
  <rect x="226" y="644" width="36" height="18" rx="5" fill="#f5f5f5" stroke="#e8e8e8" stroke-width="0.5"/>
  <text x="244" y="656" class="stk-text" text-anchor="middle">HTML</text>

  <text x="430" y="636" class="section-label">FIND ME</text>
  <text x="430" y="656" class="link-text">🌐 umbertocollodel.github.io</text>
  <text x="615" y="656" class="link-text">💼 LinkedIn</text>
</svg>
